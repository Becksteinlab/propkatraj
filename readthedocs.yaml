# readthedocs.yaml

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"

# Build documentation in the docs/ directory with Sphinx
sphinx:
   configuration: docs/sphinx/conf.py

# Optionally build your docs in additional formats such as PDF
formats:
   - pdf

python:
  install:
    - method: pip
      path: .

conda:
  environment: docs/requirements.yaml
