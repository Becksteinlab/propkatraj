# readthedocs.yaml

version: 2

build:
  os: ubuntu-24.04
  tools:
    # Miniforge provides mamba; Python version comes from docs/requirements.yaml
    python: miniforge3-latest

sphinx:
  configuration: docs/sphinx/conf.py

formats:
  - pdf

conda:
  environment: docs/requirements.yaml

python:
  install:
    - method: pip
      path: .
